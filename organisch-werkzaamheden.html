<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organische Werkzaamheden - Direct Verduurzamen</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #333;
            font-size: 28px;
        }

        .month-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .month-selector label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .month-selector select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }

        /* Performance section */
        .performance-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .performance-section h2 {
            color: #1b5e20;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .performance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .performance-chart {
            height: 320px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .performance-chart h3 {
            margin: 0 0 15px 0;
            flex-shrink: 0;
        }

        .performance-chart canvas {
            flex: 1;
        }

        .performance-table {
            overflow-x: auto;
        }

        .performance-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .performance-table th {
            background: #f9f9f9;
            border-bottom: 2px solid #1b5e20;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        .performance-table td {
            border-bottom: 1px solid #eee;
            padding: 10px 12px;
        }

        .performance-table tr:hover {
            background: #fafafa;
        }

        .trend-up {
            color: #1b5e20;
            font-weight: 600;
        }

        .trend-down {
            color: #d32f2f;
            font-weight: 600;
        }

        /* Current month stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #1b5e20;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .stat-meta {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        /* Task cards */
        .task-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar {
            background: #eee;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: #1b5e20;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 11px;
            color: #666;
            margin-bottom: 15px;
        }

        .checklist {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .checklist-item input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
        }

        .checklist-item label {
            cursor: pointer;
            font-size: 13px;
            flex: 1;
        }

        .checklist-item input[type="text"] {
            flex: 1;
            padding: 5px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }

        .add-row-btn {
            background: #1b5e20;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .add-row-btn:hover {
            background: #145a1a;
        }

        .delete-btn {
            background: #f0f0f0;
            color: #d32f2f;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .delete-btn:hover {
            background: #e0e0e0;
        }

        .linkbuilding-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .linkbuilding-table th {
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-weight: 600;
        }

        .linkbuilding-table td {
            border-bottom: 1px solid #eee;
            padding: 8px;
        }

        .linkbuilding-table input {
            width: 100%;
            padding: 4px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 12px;
        }

        .full-width-card {
            grid-column: 1 / -1;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            min-height: 100px;
        }

        .loading {
            color: #999;
            font-size: 13px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Organische Werkzaamheden</h1>
            <div class="month-selector">
                <label for="monthSelect">Kies maand:</label>
                <select id="monthSelect">
                    <option value="2025-05">Mei 2025</option>
                    <option value="2025-06">Juni 2025</option>
                    <option value="2025-07">Juli 2025</option>
                    <option value="2025-08">Augustus 2025</option>
                    <option value="2025-09">September 2025</option>
                    <option value="2025-10">Oktober 2025</option>
                    <option value="2025-11">November 2025</option>
                    <option value="2025-12">December 2025</option>
                    <option value="2026-01">Januari 2026</option>
                    <option value="2026-02">Februari 2026</option>
                    <option value="2026-03">Maart 2026</option>
                    <option value="2026-04">April 2026</option>
                    <option value="2026-05" selected>Mei 2026</option>
                    <option value="2026-06">Juni 2026</option>
                    <option value="2026-07">Juli 2026</option>
                    <option value="2026-08">Augustus 2026</option>
                    <option value="2026-09">September 2026</option>
                    <option value="2026-10">Oktober 2026</option>
                    <option value="2026-11">November 2026</option>
                    <option value="2026-12">December 2026</option>
                </select>
            </div>
        </header>

        <!-- Performance Section -->
        <div class="performance-section">
            <h2>📊 Organisch Performance</h2>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-label">Bezoekers</div>
                    <div class="stat-value" id="gscClicks">-</div>
                    <div class="stat-meta">deze maand</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">GSC Impressies</div>
                    <div class="stat-value" id="gscImpressions">-</div>
                    <div class="stat-meta">deze maand</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg. Positie</div>
                    <div class="stat-value" id="gscPosition">-</div>
                    <div class="stat-meta">deze maand</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Leads</div>
                    <div class="stat-value" id="gaConversions">-</div>
                    <div class="stat-meta">deze maand</div>
                </div>
            </div>

            <div class="performance-grid">
                <div class="performance-chart">
                    <h3 style="font-size: 14px;">Leads Trend</h3>
                    <canvas id="leadsChart"></canvas>
                </div>
                <div class="performance-chart">
                    <h3 style="font-size: 14px;">Bezoekers Trend</h3>
                    <canvas id="usersChart"></canvas>
                </div>
            </div>
            <div class="performance-table" style="margin-top: 30px;">
                    <h3 style="margin-bottom: 15px; font-size: 14px;">Maandoverzicht (Direct + Organic)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Maand</th>
                                <th>GSC Clicks</th>
                                <th>GSC Impr.</th>
                                <th>Leads</th>
                            </tr>
                        </thead>
                        <tbody id="cumulativeTable">
                            <tr class="loading"><td colspan="6">Data laden...</td></tr>
                        </tbody>
                    </table>
            </div>
        </div>

        <!-- Task Cards -->
        <div class="task-cards" id="taskCards"></div>
    </div>

    <script>
        const MONTHS = {
            '2025-05': 'Mei \'25',
            '2025-06': 'Juni \'25',
            '2025-07': 'Juli \'25',
            '2025-08': 'Augustus \'25',
            '2025-09': 'September \'25',
            '2025-10': 'Oktober \'25',
            '2025-11': 'November \'25',
            '2025-12': 'December \'25',
            '2026-01': 'Januari',
            '2026-02': 'Februari',
            '2026-03': 'Maart',
            '2026-04': 'April',
            '2026-05': 'Mei',
            '2026-06': 'Juni',
            '2026-07': 'Juli',
            '2026-08': 'Augustus',
            '2026-09': 'September',
            '2026-10': 'Oktober',
            '2026-11': 'November',
            '2026-12': 'December'
        };

        const MONTHLY_DATA = {
            '2025-05': { gscClicks: 801, gscImpressions: 134488, users: 56, conversions: 6, ctr: 0.0060, position: 19.2 },
            '2025-06': { gscClicks: 416, gscImpressions: 99449, users: 43, conversions: 4, ctr: 0.0042, position: 20.1 },
            '2025-07': { gscClicks: 455, gscImpressions: 117978, users: 38, conversions: 4, ctr: 0.0039, position: 20.8 },
            '2025-08': { gscClicks: 362, gscImpressions: 110145, users: 18, conversions: 3, ctr: 0.0033, position: 21.5 },
            '2025-09': { gscClicks: 552, gscImpressions: 85297, users: 48, conversions: 5, ctr: 0.0065, position: 19.3 },
            '2025-10': { gscClicks: 603, gscImpressions: 90547, users: 59, conversions: 6, ctr: 0.0067, position: 18.9 },
            '2025-11': { gscClicks: 897, gscImpressions: 126681, users: 26, conversions: 9, ctr: 0.0071, position: 18.1 },
            '2025-12': { gscClicks: 792, gscImpressions: 124626, users: 1, conversions: 8, ctr: 0.0064, position: 19.7 },
            '2026-01': { gscClicks: 1030, gscImpressions: 130483, users: 0, conversions: 10, ctr: 0.0077, position: 23.2 },
            '2026-02': { gscClicks: 880, gscImpressions: 124758, users: 4, conversions: 9, ctr: 0.0071, position: 22.6 },
            '2026-03': { gscClicks: 902, gscImpressions: 119664, users: 31, conversions: 16, ctr: 0.0075, position: 17.4 },
            '2026-04': { gscClicks: 881, gscImpressions: 105563, users: 27, conversions: 10, ctr: 0.0083, position: 16.9 },
            '2026-05': { gscClicks: 1045, gscImpressions: 121522, users: 125, conversions: 14, ctr: 0.0086, position: 17.3 }
        };

        let leadsChart = null;
        let usersChart = null;

        document.getElementById('monthSelect').addEventListener('change', (e) => {
            const month = e.target.value;
            loadMonthData(month);
            changeMonth(month);
        });

        async function loadMonthData(month) {
            console.log('Loading data for month:', month);
            const [year, monthNum] = month.split('-');

            try {
                // Determine date range
                const startDate = `${year}-${monthNum}-01`;
                let endDate;
                if (monthNum === '12') {
                    endDate = `${year}-12-31`;
                } else {
                    const nextMonth = String(parseInt(monthNum) + 1).padStart(2, '0');
                    endDate = new Date(year, parseInt(monthNum), 0).toISOString().split('T')[0];
                }

                console.log(`Fetching data from ${startDate} to ${endDate}`);

                // Since we can't directly call Windsor API from client, we'll use the cached data
                // For real-time updates, this would need a backend endpoint
                updateCurrentMonthStats(month);
                updateCumulativeTable();
                updateTrendCharts();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function updateCurrentMonthStats(month) {
            // Using MONTHLY_DATA for stats
            const data = MONTHLY_DATA[month] || { gscClicks: 0, gscImpressions: 0, users: 0, conversions: 0 };

            document.getElementById('gscClicks').textContent = data.gscClicks.toLocaleString();
            document.getElementById('gscImpressions').textContent = data.gscImpressions.toLocaleString();
            document.getElementById('gscPosition').textContent = data.position > 0 ? data.position.toFixed(1) : '-';
            document.getElementById('gaConversions').textContent = data.conversions.toLocaleString();

            const leadsCountEl = document.getElementById('leadsCount');
            if (leadsCountEl) leadsCountEl.textContent = Math.round(data.conversions);
        }

        function updateCumulativeTable() {
            const tbody = document.getElementById('cumulativeTable');
            tbody.innerHTML = '';

            Object.entries(MONTHLY_DATA).forEach(([month, data]) => {
                let monthLabel = MONTHS[month];
                if (month === '2026-05') {
                    monthLabel += ' (t/m 29)';
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${monthLabel}</strong></td>
                    <td>${data.gscClicks.toLocaleString()}</td>
                    <td>${(data.gscImpressions / 1000).toFixed(0)}k</td>
                    <td><strong>${data.conversions}</strong></td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateTrendCharts() {
            const months = Object.keys(MONTHLY_DATA).map(m => {
                let label = MONTHS[m];
                if (m === '2026-05') label = 'Mei*';
                return label;
            });
            const leads = Object.values(MONTHLY_DATA).map(d => d.conversions);
            const clicks = Object.values(MONTHLY_DATA).map(d => d.gscClicks);

            // Leads chart
            const ctxLeads = document.getElementById('leadsChart').getContext('2d');
            if (leadsChart) leadsChart.destroy();

            leadsChart = new Chart(ctxLeads, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Leads',
                        data: leads,
                        borderColor: '#1b5e20',
                        backgroundColor: 'rgba(27, 94, 32, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#1b5e20',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: Math.max(...leads) * 1.2
                        }
                    }
                }
            });

            // Bezoekers (GSC Clicks) chart
            const ctxUsers = document.getElementById('usersChart').getContext('2d');
            if (usersChart) usersChart.destroy();

            usersChart = new Chart(ctxUsers, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Bezoekers (GSC Clicks)',
                        data: clicks,
                        borderColor: '#42a5f5',
                        backgroundColor: 'rgba(66, 165, 245, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#42a5f5',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: Math.max(...clicks) * 1.2
                        }
                    }
                }
            });
        }

        function changeMonth(month) {
            localStorage.setItem('currentMonth', month);
            renderCards();
        }

        function getData() {
            const month = localStorage.getItem('currentMonth') || '2026-05';
            const key = `organisch-${month}`;
            const defaultData = {
                newBlogs: month === '2026-05' ? [
                    { title: 'Hoelang gaan kunststof kozijnen mee', url: 'https://directverduurzamen.nl/hoelang-gaan-kunststof-kozijnen-mee/', done: true },
                    { title: 'Montagefoam of compriband', url: '/montagefoam-of-compriband-kozijnen/', done: false },
                    { title: 'Woning voorbereiden kozijnen vervangen', url: '/woning-voorbereiden-kozijnen-vervangen/', done: false },
                    { title: 'Inbraakwerend glas P4A P5A', url: '/inbraakwerend-glas-p4a-p5a/', done: false },
                    { title: 'Kunststof kozijnen jaren 70 woning', url: '/kunststof-kozijnen-jaren-70-woning/', done: false }
                ] : Array(5).fill(null).map((_, i) => ({ title: `Blog ${i+1}`, url: '', done: false })),
                rewrite: month === '2026-05' ? [
                    { title: 'ISDE Subsidie', url: '/subsidie/isde-subsidie/', done: false },
                    { title: 'SVOH Subsidie', url: '/subsidie/svoh-subsidie/', done: false },
                    { title: 'DUMAVA Subsidie', url: '/subsidie/dumava-subsidie/', done: false },
                    { title: 'SVVE Subsidie', url: '/subsidie/svve-subsidie/', done: false },
                    { title: 'SEEH Subsidie', url: '/subsidie/seeh-subsidie/', done: false }
                ] : Array(5).fill(null).map((_, i) => ({ title: `Herschrijving ${i+1}`, url: '', done: false })),
                googleProfile: Array(4).fill(null).map((_, i) => ({ title: `Post ${i+1}`, notes: '', done: false })),
                websiteProjects: month === '2026-05' ? [
                    { title: 'Project Epe', url: 'https://directverduurzamen.nl/project/epe/', done: true },
                    { title: 'Project Deventer', url: 'https://directverduurzamen.nl/project/deventer/', done: true },
                    { title: 'Project Daarleveen', url: 'https://directverduurzamen.nl/project/daarleveen/', done: true },
                    { title: 'Project Rotterdam', url: 'https://directverduurzamen.nl/project/rotterdam/', done: true },
                    { title: 'Week 5', url: '', done: false }
                ] : Array(5).fill(null).map((_, i) => ({ title: `Week ${i+1}`, url: '', done: false })),
                socialProjects: month === '2026-05' ? [
                    { title: '29 mei', url: 'https://www.facebook.com/913604654948329/posts/1014937398148387', done: true },
                    { title: '22 mei', url: 'https://www.facebook.com/913604654948329/posts/1008894632085997', done: true },
                    { title: 'Week 3', url: '', done: false },
                    { title: 'Week 4', url: '', done: false },
                    { title: 'Week 5', url: '', done: false }
                ] : Array(5).fill(null).map((_, i) => ({ title: `Week ${i+1}`, url: '', done: false })),
                adhocItems: [],
                linkbuilding: []
            };

            const stored = localStorage.getItem(key);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    // Voor mei 2026: gebruik altijd defaultData als basis, bewaar alleen done-status
                    if (month === '2026-05') {
                        const result = JSON.parse(JSON.stringify(defaultData));
                        if (parsed.adhocItems) result.adhocItems = parsed.adhocItems;
                        if (parsed.linkbuilding) result.linkbuilding = parsed.linkbuilding;
                        ['newBlogs','rewrite','websiteProjects','socialProjects','googleProfile'].forEach(function(k) {
                            if (parsed[k]) {
                                result[k] = result[k].map(function(item, i) {
                                    return Object.assign({}, item, { done: parsed[k][i] ? parsed[k][i].done : item.done });
                                });
                            }
                        });
                        return result;
                    }
                    return Object.assign({}, defaultData, parsed);
                } catch (e) {
                    return defaultData;
                }
            }
            return defaultData;
        }

        function saveData() {
            const month = localStorage.getItem('currentMonth') || '2026-05';
            const key = `organisch-${month}`;
            const data = getData();

            // Update task checklist items
            document.querySelectorAll('#newBlogsList .checklist-item, #rewriteList .checklist-item, #googleList .checklist-item, #websiteList .checklist-item, #socialList .checklist-item').forEach((item) => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                const inputs = item.querySelectorAll('input[type="text"]');
                const type = checkbox.dataset.type;

                if (type === 'newBlogs') {
                    const idx = Array.from(document.getElementById('newBlogsList').children).indexOf(item);
                    if (data.newBlogs[idx]) {
                        data.newBlogs[idx].done = checkbox.checked;
                        if (inputs[0]) data.newBlogs[idx].url = inputs[0].value;
                    }
                } else if (type === 'rewrite') {
                    const idx = Array.from(document.getElementById('rewriteList').children).indexOf(item);
                    if (data.rewrite[idx]) {
                        data.rewrite[idx].done = checkbox.checked;
                        if (inputs[0]) data.rewrite[idx].url = inputs[0].value;
                    }
                } else if (type === 'googleProfile') {
                    const idx = Array.from(document.getElementById('googleList').children).indexOf(item);
                    if (data.googleProfile[idx]) {
                        data.googleProfile[idx].done = checkbox.checked;
                        if (inputs[0]) data.googleProfile[idx].notes = inputs[0].value;
                    }
                } else if (type === 'websiteProject') {
                    const idx = Array.from(document.getElementById('websiteList').children).indexOf(item);
                    if (data.websiteProjects[idx]) {
                        data.websiteProjects[idx].done = checkbox.checked;
                        if (inputs[0]) data.websiteProjects[idx].url = inputs[0].value;
                    }
                } else if (type === 'socialProject') {
                    const idx = Array.from(document.getElementById('socialList').children).indexOf(item);
                    if (data.socialProjects[idx]) {
                        data.socialProjects[idx].done = checkbox.checked;
                        if (inputs[0]) data.socialProjects[idx].url = inputs[0].value;
                    }
                }
            });

            // Update ad hoc items
            const adhocItems = document.querySelectorAll('#adhocList .checklist-item');
            data.adhocItems = Array.from(adhocItems).map(item => ({
                text: item.querySelector('input[type="text"]').value,
                done: item.querySelector('input[type="checkbox"]').checked
            }));

            // Update linkbuilding items
            const linkbuildingRows = document.querySelectorAll('.linkbuilding-row');
            data.linkbuilding = Array.from(linkbuildingRows).map(row => ({
                url_plaatsing: row.querySelector('[data-field="url_plaatsing"]').value,
                anchor: row.querySelector('[data-field="anchor"]').value,
                url_doel: row.querySelector('[data-field="url_doel"]').value,
                done: row.querySelector('input[type="checkbox"]').checked
            }));

            localStorage.setItem(key, JSON.stringify(data));
            updateProgress();
        }

        function renderCards() {
            const data = getData();
            const month = localStorage.getItem('currentMonth') || '2026-05';
            const container = document.getElementById('taskCards');
            container.innerHTML = '';

            // Nieuwe Blogs
            const newBlogsCard = document.createElement('div');

            newBlogsCard.innerHTML = `
                <h3>📝 Nieuwe Blogs <span id="newBlogsProgress">0/5</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="newBlogsBar" style="width: 0%"></div></div>
                <div class="progress-text" id="newBlogsText">0 van 5 voltooid</div>
                <div class="checklist" id="newBlogsList"></div>
            `;
            container.appendChild(newBlogsCard);

            data.newBlogs.forEach((blog, idx) => {
                const item = document.createElement('div');
                item.className = 'checklist-item';
                item.innerHTML = `
                    <input type="checkbox" data-type="newBlogs" ${blog.done ? 'checked' : ''} onchange="saveData()">
                    <input type="text" placeholder="URL" value="${blog.url}" onchange="saveData()">
                `;
                document.getElementById('newBlogsList').appendChild(item);
            });

            // Herschreven Blogs
            const rewriteCard = document.createElement('div');
            rewriteCard.className = 'card';
            rewriteCard.innerHTML = `
                <h3>♻️ Herschreven blogs <span id="rewriteProgress">0/5</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="rewriteBar" style="width: 0%"></div></div>
                <div class="progress-text" id="rewriteText">0 van 5 voltooid</div>
                <div class="checklist" id="rewriteList"></div>
            `;
            container.appendChild(rewriteCard);

            data.rewrite.forEach((blog, idx) => {
                const item = document.createElement('div');
                item.className = 'checklist-item';
                item.innerHTML = `
                    <input type="checkbox" data-type="rewrite" ${blog.done ? 'checked' : ''} onchange="saveData()">
                    <input type="text" placeholder="URL" value="${blog.url}" onchange="saveData()">
                `;
                document.getElementById('rewriteList').appendChild(item);
            });

            // Google Bedrijfsprofiel
            const googleCard = document.createElement('div');
            googleCard.className = 'card';
            googleCard.innerHTML = `
                <h3>🏢 Google Bedrijfsprofiel <span id="googleProgress">0/4</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="googleBar" style="width: 0%"></div></div>
                <div class="progress-text" id="googleText">0 van 4 voltooid</div>
                <div class="checklist" id="googleList"></div>
            `;
            container.appendChild(googleCard);

            data.googleProfile.forEach((post, idx) => {
                const item = document.createElement('div');
                item.className = 'checklist-item';
                item.innerHTML = `
                    <input type="checkbox" data-type="googleProfile" ${post.done ? 'checked' : ''} onchange="saveData()">
                    <input type="text" placeholder="Notities" value="${post.notes}" onchange="saveData()">
                `;
                document.getElementById('googleList').appendChild(item);
            });

            // Website Projecten
            const websiteCard = document.createElement('div');
            websiteCard.className = 'card';
            websiteCard.innerHTML = `
                <h3>🌐 Website Updates <span id="websiteProgress">0/5</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="websiteBar" style="width: 0%"></div></div>
                <div class="progress-text" id="websiteText">0 van 5 voltooid</div>
                <div class="checklist" id="websiteList"></div>
            `;
            container.appendChild(websiteCard);

            data.websiteProjects.forEach((project, idx) => {
                const item = document.createElement('div');
                item.className = 'checklist-item';
                item.innerHTML = `
                    <input type="checkbox" data-type="websiteProject" ${project.done ? 'checked' : ''} onchange="saveData()">
                    <input type="text" placeholder="URL" value="${project.url}" onchange="saveData()">
                `;
                document.getElementById('websiteList').appendChild(item);
            });

            // Social Media Projecten
            const socialCard = document.createElement('div');
            socialCard.className = 'card';
            socialCard.innerHTML = `
                <h3>📱 Social Media Updates <span id="socialProgress">0/5</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="socialBar" style="width: 0%"></div></div>
                <div class="progress-text" id="socialText">0 van 5 voltooid</div>
                <div class="checklist" id="socialList"></div>
            `;
            container.appendChild(socialCard);

            data.socialProjects.forEach((project, idx) => {
                const item = document.createElement('div');
                item.className = 'checklist-item';
                item.innerHTML = `
                    <input type="checkbox" data-type="socialProject" ${project.done ? 'checked' : ''} onchange="saveData()">
                    <input type="text" placeholder="URL" value="${project.url}" onchange="saveData()">
                `;
                document.getElementById('socialList').appendChild(item);
            });

            // Ad hoc items
            const adhocCard = document.createElement('div');
            adhocCard.className = 'card';
            adhocCard.innerHTML = `
                <h3>📌 Ad hoc Zaken <span id="leadsCount" style="color: #1b5e20; font-weight: 600;">0</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="adhocBar" style="width: 0%"></div></div>
                <div class="progress-text" id="adhocText">0 rijen voltooid</div>
                <div class="checklist" id="adhocList"></div>
                <button class="add-row-btn" onclick="addAdhocItem()">+ Item toevoegen</button>
            `;
            container.appendChild(adhocCard);

            data.adhocItems.forEach((item, idx) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'checklist-item';
                itemEl.innerHTML = `
                    <input type="checkbox" data-type="adhocItem" ${item.done ? 'checked' : ''} onchange="saveData()">
                    <input type="text" placeholder="Ad hoc item" value="${item.text}" onchange="saveData()">
                    <button class="delete-btn" onclick="deleteAdhocItem(this)">Delete</button>
                `;
                document.getElementById('adhocList').appendChild(itemEl);

            // Linkbuilding
            const linkCard = document.createElement('div');
            linkCard.className = 'card full-width-card';
            linkCard.innerHTML = `
                <h3>🔗 Linkbuilding <span id="linkProgress">0/0</span></h3>
                <div class="progress-bar"><div class="progress-fill" id="linkBar" style="width: 0%"></div></div>
                <div class="progress-text" id="linkText">0 rijen voltooid</div>

            `;
            container.appendChild(linkCard);

            updateProgress();
        }

        function createLinkbuildingRow(link, idx) {
            const row = document.createElement('tr');
            row.className = 'linkbuilding-row';
            row.innerHTML = `
                <td><input type="checkbox" ${link.done ? 'checked' : ''} onchange="saveData()"></td>
                <td><input type="text" data-field="url_plaatsing" value="${link.url_plaatsing}" placeholder="https://..." onchange="saveData()"></td>
                <td><input type="text" data-field="anchor" value="${link.anchor}" placeholder="Anchor text" onchange="saveData()"></td>
                <td><input type="text" data-field="url_doel" value="${link.url_doel}" placeholder="https://..." onchange="saveData()"></td>
                <td><button class="delete-btn" onclick="deleteLinkbuildingRow(this)">Delete</button></td>
            `;
            return row;
        }

        function addLinkbuildingRow() {
            const tbody = document.getElementById('linkbuildingRows');
            const newLink = { url_plaatsing: '', anchor: '', url_doel: '', done: false };
            const row = createLinkbuildingRow(newLink, tbody.children.length);
            tbody.appendChild(row);
            saveData();
        }

        function deleteLinkbuildingRow(btn) {
            btn.closest('tr').remove();
            saveData();
        }

        function addAdhocItem() {
            const data = getData();
            data.adhocItems.push({ text: '', done: false });
            const list = document.getElementById('adhocList');
            const itemEl = document.createElement('div');
            itemEl.className = 'checklist-item';
            itemEl.innerHTML = `
                <input type="checkbox" data-type="adhocItem" onchange="saveData()">
                <input type="text" placeholder="Ad hoc item" onchange="saveData()">
                <button class="delete-btn" onclick="deleteAdhocItem(this)">Delete</button>
            `;
            list.appendChild(itemEl);
            saveData();
        }

        function deleteAdhocItem(btn) {
            btn.closest('.checklist-item').remove();
            saveData();
        }

        function updateProgress() {
            const data = getData();

            // Nieuwe Blogs
            const newBlogsDone = data.newBlogs.filter(b => b.done).length;
            document.getElementById('newBlogsProgress').textContent = `${newBlogsDone}/5`;
            document.getElementById('newBlogsText').textContent = `${newBlogsDone} van 5 voltooid`;
            document.getElementById('newBlogsBar').style.width = `${(newBlogsDone / 5) * 100}%`;

            // Herschreven
            const rewriteDone = data.rewrite.filter(b => b.done).length;
            document.getElementById('rewriteProgress').textContent = `${rewriteDone}/5`;
            document.getElementById('rewriteText').textContent = `${rewriteDone} van 5 voltooid`;
            document.getElementById('rewriteBar').style.width = `${(rewriteDone / 5) * 100}%`;

            // Google Profile
            const googleDone = data.googleProfile.filter(p => p.done).length;
            document.getElementById('googleProgress').textContent = `${googleDone}/4`;
            document.getElementById('googleText').textContent = `${googleDone} van 4 voltooid`;
            document.getElementById('googleBar').style.width = `${(googleDone / 4) * 100}%`;

            // Website Projects
            const websiteDone = data.websiteProjects.filter(p => p.done).length;
            document.getElementById('websiteProgress').textContent = `${websiteDone}/5`;
            document.getElementById('websiteText').textContent = `${websiteDone} van 5 voltooid`;
            document.getElementById('websiteBar').style.width = `${(websiteDone / 5) * 100}%`;

            // Social Projects
            const socialDone = data.socialProjects.filter(p => p.done).length;
            document.getElementById('socialProgress').textContent = `${socialDone}/5`;
            document.getElementById('socialText').textContent = `${socialDone} van 5 voltooid`;
            document.getElementById('socialBar').style.width = `${(socialDone / 5) * 100}%`;

            // Ad hoc items
            const adhocDone = data.adhocItems.filter(i => i.done).length;
            const adhocTotal = data.adhocItems.length || 0;
            document.getElementById('adhocText').textContent = adhocTotal > 0 ? `${adhocDone} van ${adhocTotal} voltooid` : '0 rijen';
            document.getElementById('adhocBar').style.width = adhocTotal > 0 ? `${(adhocDone / adhocTotal) * 100}%` : '0%';

            // Linkbuilding
            const linkDone = data.linkbuilding.filter(l => l.done).length;
            const linkTotal = data.linkbuilding.length || 1;
            document.getElementById('linkProgress').textContent = `${linkDone}/${linkTotal}`;
            document.getElementById('linkText').textContent = linkTotal > 0 ? `${linkDone} van ${linkTotal} voltooid` : '0 rijen';
            document.getElementById('linkBar').style.width = linkTotal > 0 ? `${(linkDone / linkTotal) * 100}%` : '0%';
        }

        // Initialize
        const initialMonth = localStorage.getItem('currentMonth') || '2026-05';
        document.getElementById('monthSelect').value = initialMonth;
        localStorage.setItem('currentMonth', initialMonth);
        loadMonthData(initialMonth);
        updateTrendCharts();
        renderCards();
    </script>
